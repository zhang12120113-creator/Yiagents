services:
  yiagents:
    build: .
    env_file:
      - .env
    volumes:
      - yiagents_data:/home/appuser/.yiagents
    tty: true
    stdin_open: true

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama

  yiagents-ollama:
    build: .
    env_file:
      - .env
    environment:
      - YIAGENTS_LLM_PROVIDER=ollama
      - OLLAMA_BASE_URL=http://ollama:11434/v1
    volumes:
      - yiagents_data:/home/appuser/.yiagents
    depends_on:
      - ollama
    tty: true
    stdin_open: true
    profiles:
      - ollama

volumes:
  yiagents_data:
  ollama_data:
