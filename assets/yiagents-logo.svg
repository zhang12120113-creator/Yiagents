<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 110" width="520" height="110" role="img" aria-label="YiAgents">
  <title>YiAgents</title>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <!-- Mark: connected ascending nodes (multi-agent collaboration + upward trend) -->
  <g transform="translate(10,18)">
    <polyline points="10,74 44,54 78,62 112,24" fill="none" stroke="url(#g)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="10" cy="74" r="7" fill="#1d4ed8"/>
    <circle cx="44" cy="54" r="7" fill="#2563eb"/>
    <circle cx="78" cy="62" r="7" fill="#3b82f6"/>
    <circle cx="112" cy="24" r="9" fill="#0ea5e9"/>
  </g>
  <!-- Wordmark -->
  <text x="150" y="76" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" letter-spacing="-1">
    <tspan fill="#0f172a">Yi</tspan><tspan fill="#2563eb">Agents</tspan>
  </text>
</svg>
